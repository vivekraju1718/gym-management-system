spring.application.name=GymManagementSystem
logging.pattern.console=%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n
logging.level.root=${LOG_LEVEL:INFO}
logging.pattern.file={"timestamp":"%d{yyyy-MM-dd HH:mm:ss}","level":"%p","logger":"%c","message":"%m"}
logging.level.org.springframework.security=DEBUG
logging.level.com.GymManagement.System=TRACE
logging.level.com.GymManagement.System.filter.JwtTokenValidationFilter=DEBUG
logging.level.com.GymManagement.System.security=DEBUG

# See all HTTP requests
logging.level.org.springframework.web=DEBUG

# JWT debug
logging.level.io.jsonwebtoken=DEBUG
spring.datasource.url=jdbc:mysql://${DATABASE_HOST:localhost}:${DATABASE_PORT:3309}/${DATABASE_NAME:GymManagementSystem}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
stripe.secret.key=${STRIPE_KEY}
